<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Sketches</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    canvas { display: block; }
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      align-items: center;
      gap: 14px;
      font: 11px system-ui, -apple-system, sans-serif;
      color: #CCC;
      letter-spacing: 0.15em;
    }
    #controls.visible { display: flex; }
    #controls label { font-weight: 500; }
    #speed-val {
      font-variant-numeric: tabular-nums;
      min-width: 2.5em;
      letter-spacing: 0;
      font-weight: 400;
    }
    #speed {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      height: 16px;
      width: 240px;
      margin: 0;
      padding: 0;
      cursor: pointer;
    }
    #speed::-webkit-slider-runnable-track {
      height: 1px;
      background: #CCC;
      border-radius: 1px;
    }
    #speed::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      height: 10px;
      width: 10px;
      border-radius: 50%;
      background: #CCC;
      margin-top: -4.5px;
      border: none;
    }
    #speed::-moz-range-track {
      height: 1px;
      background: #CCC;
      border: none;
    }
    #speed::-moz-range-thumb {
      height: 10px;
      width: 10px;
      border-radius: 50%;
      background: #CCC;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label for="speed">SPEED</label>
    <input type="range" id="speed" min="1" max="10" step="1" value="1" />
    <span id="speed-val">1x</span>
  </div>
  <script src="preview-v2.js"></script>
</body>
</html>
